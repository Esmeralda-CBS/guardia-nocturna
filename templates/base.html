<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Guardia Nocturna{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen" x-data="{ menuOpen: false }">

  <!-- Navbar -->
  <nav class="bg-blue-700 text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <!-- Brand -->
        <a href="/" class="font-bold text-lg tracking-wide flex items-center gap-2">
          🚒 Guardia Nocturna "Fernando Waymann"
        </a>

        <!-- Desktop nav -->
        <div class="hidden sm:flex items-center gap-4 text-sm font-medium">
          {% if active_shift %}
          <a href="/turnos/{{ active_shift['id'] }}" class="bg-red-900 px-3 py-1 rounded-full text-yellow-300 font-bold">
            Guardia activa
          </a>
          {% endif %}
          <a href="/turnos" class="hover:text-yellow-200">Turnos</a>
          <div class="relative" x-data="{ open: false }">
            <button @click="open = !open" class="hover:text-yellow-200 flex items-center gap-1">
              Admin ▾
            </button>
            <div x-show="open" @click.outside="open = false" x-cloak
                 class="absolute right-0 mt-1 bg-white text-gray-800 rounded shadow-lg py-1 min-w-[160px]">
              <a href="/admin/voluntarios" class="block px-4 py-2 hover:bg-gray-100">Voluntarios</a>
              <a href="/admin/camas" class="block px-4 py-2 hover:bg-gray-100">Camas</a>
              <a href="/admin/camiones" class="block px-4 py-2 hover:bg-gray-100">Camiones</a>
              <a href="/admin/funciones" class="block px-4 py-2 hover:bg-gray-100">Funciones</a>
            </div>
          </div>
        </div>

        <!-- Mobile hamburger -->
        <button @click="menuOpen = !menuOpen" class="sm:hidden p-2 rounded hover:bg-red-800">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div x-show="menuOpen" x-cloak class="sm:hidden bg-red-800 px-4 pb-4 space-y-2">
      {% if active_shift %}
      <a href="/turnos/{{ active_shift['id'] }}" class="block py-2 text-yellow-300 font-bold">
        🟢 Guardia activa
      </a>
      {% endif %}
      <a href="/turnos" class="block py-2 hover:text-yellow-200">Turnos</a>
      <hr class="border-red-600">
      <p class="text-red-300 text-xs uppercase tracking-wider pt-1">Administración</p>
      <a href="/admin/voluntarios" class="block py-2 hover:text-yellow-200">Voluntarios</a>
      <a href="/admin/camas" class="block py-2 hover:text-yellow-200">Camas</a>
      <a href="/admin/camiones" class="block py-2 hover:text-yellow-200">Camiones</a>
      <a href="/admin/funciones" class="block py-2 hover:text-yellow-200">Funciones</a>
    </div>
  </nav>

  <!-- Main content -->
  <main class="max-w-4xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
